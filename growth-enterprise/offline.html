<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThinkStore Enterprise · Sin conexión</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="theme-color" content="#07111d" />
</head>
<body>
  <section class="lock-screen">
    <div class="aurora"></div>
    <div class="lock-card">
      <img src="assets/thinkstore-logo-white.png" alt="ThinkStore" class="lock-logo" />
      <span class="pill">Modo offline</span>
      <h1>Sin conexión</h1>
      <p>ThinkStore Enterprise necesita internet para consultar Supabase y mostrar datos reales. Revisa tu conexión y vuelve a intentarlo.</p>
      <button class="logout" onclick="location.reload()">Reintentar</button>
    </div>
  </section>
</body>
</html>
