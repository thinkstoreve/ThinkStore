<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña · ThinkStore Enterprise</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <section class="lock-screen">
    <div class="aurora"></div>
    <div class="lock-card">
      <img src="assets/thinkstore-logo-white.png" alt="ThinkStore" class="lock-logo" />
      <span class="pill">Supabase Auth · Recuperación</span>
      <h1>Nueva contraseña</h1>
      <p>Ingresa una contraseña nueva para tu acceso de Growth Enterprise.</p>

      <form id="resetForm" class="login-form">
        <input id="newPassword" type="password" placeholder="Nueva contraseña" autocomplete="new-password" required minlength="8" />
        <input id="confirmPassword" type="password" placeholder="Confirmar contraseña" autocomplete="new-password" required minlength="8" />
        <button type="submit">Guardar contraseña</button>
      </form>

      <small id="resetMessage" class="login-message">El enlace debe venir desde el correo de recuperación.</small>
      <div class="reset-actions">
        <button type="button" class="forgot-link" onclick="window.location.href='index.html'">Volver al login</button>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>
